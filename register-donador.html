<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta — Donador</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

<div class="login-wrapper">

  <!-- ── PANEL IZQUIERDO ── -->
  <div class="login-left">
    <div class="login-left-bg"></div>
    <div class="login-blob login-blob-1"></div>
    <div class="login-blob login-blob-2"></div>
    <div class="login-blob login-blob-3"></div>

    <div class="login-logo">
      <img src="images/logo.png" alt="Logo" />
    </div>

    <div class="login-left-content">
      <p class="login-left-eyebrow">Únete a la causa</p>
      <h1 class="login-left-titulo">
        Sé parte del<br /><span>cambio educativo</span>
      </h1>
      <p class="login-left-desc">
        Crea tu cuenta y empieza a donar útiles escolares a los niños
        que más lo necesitan en todo México.
      </p>
    </div>
  </div>

  <!-- ── PANEL DERECHO ── -->
  <div class="login-right">
    <div class="login-card">

      <div class="login-card-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5
                   2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09
                   C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5
                   c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </div>

      <h2>Crear una cuenta</h2>
      <p class="login-card-sub">
        Accede a tus tareas, notas y proyectos en cualquier momento y lugar.
      </p>

      <div id="regMsg" class="login-msg"></div>

      <div class="campo-grupo">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="María García López" autocomplete="name" />
      </div>

      <div class="campo-grupo">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="tu@correo.com" autocomplete="email" />
      </div>

      <div class="campo-grupo">
        <label for="fecha">Fecha de nacimiento</label>
        <input type="date" id="fecha" />
      </div>

      <div class="campo-grupo">
        <label for="estado">Estado</label>
        <select id="estado">
          <option value="">Selecciona tu estado</option>
          <option>Aguascalientes</option><option>Baja California</option>
          <option>Baja California Sur</option><option>Campeche</option>
          <option>Chiapas</option><option>Chihuahua</option>
          <option>Ciudad de México</option><option>Coahuila</option>
          <option>Colima</option><option>Durango</option>
          <option>Guanajuato</option><option>Guerrero</option>
          <option>Hidalgo</option><option>Jalisco</option>
          <option>México</option><option>Michoacán</option>
          <option>Morelos</option><option>Nayarit</option>
          <option>Nuevo León</option><option>Oaxaca</option>
          <option>Puebla</option><option>Querétaro</option>
          <option>Quintana Roo</option><option>San Luis Potosí</option>
          <option>Sinaloa</option><option>Sonora</option>
          <option>Tabasco</option><option>Tamaulipas</option>
          <option>Tlaxcala</option><option>Veracruz</option>
          <option>Yucatán</option><option>Zacatecas</option>
        </select>
      </div>

      <div class="campo-grupo">
        <label for="password">Contraseña</label>
        <div class="campo-password">
          <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
          <button type="button" class="btn-ojo" onclick="togglePassword('password', this)" title="Mostrar contraseña">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.458 12C3.732 7.943 7.523 5 12 5
                   c4.477 0 8.268 2.943 9.542 7
                   -1.274 4.057-5.065 7-9.542 7
                   -4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-login" onclick="registrarDonador()">Crear cuenta</button>

      <div class="login-footer-links">
        ¿Ya tienes cuenta? <a href="login-donador.html">Inicia sesión</a>
      </div>

    </div>
  </div>

</div>

<script>
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId)
    const isHidden = input.type === 'password'
    input.type = isHidden ? 'text' : 'password'
    btn.title = isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña'
  }

  function mostrarMsg(texto, tipo) {
    const el = document.getElementById('regMsg')
    el.textContent = texto
    el.className = 'login-msg ' + tipo
  }

  async function registrarDonador() {
    const nombre   = document.getElementById('nombre').value.trim()
    const correo   = document.getElementById('correo').value.trim()
    const fecha    = document.getElementById('fecha').value
    const estado   = document.getElementById('estado').value
    const password = document.getElementById('password').value

    if (!nombre || !correo || !password) {
      mostrarMsg('Nombre, correo y contraseña son requeridos.', 'error')
      return
    }
    if (password.length < 8) {
      mostrarMsg('La contraseña debe tener al menos 8 caracteres.', 'error')
      return
    }

    try {
      const res  = await fetch('/api/auth/register-donador', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre_completo: nombre,
          correo, password,
          fecha_nacimiento: fecha || null,
          estado: estado || null
        })
      })
      const data = await res.json()

      if (!res.ok) {
        mostrarMsg(data.message || 'Error al registrar.', 'error')
        return
      }

      mostrarMsg('¡Cuenta creada! Redirigiendo al login...', 'ok')
      setTimeout(() => { window.location.href = 'login-donador.html' }, 1200)

    } catch (err) {
      mostrarMsg('Error de conexión con el servidor.', 'error')
    }
  }
</script>
</body>
</html>
