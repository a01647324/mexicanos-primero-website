<script>
// ── Fecha ─────────────────────────────────────────────────────
(function() {
  var d = new Date();
  var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var dias  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  document.getElementById('panel-fecha').textContent =
    dias[d.getDay()] + ', ' + d.getDate() + ' ' + meses[d.getMonth()] + ' ' + d.getFullYear();
})();

// ── Animar número ─────────────────────────────────────────────
function animarNumero(el, destino, duracion) {
  var inicio = 0;
  var paso   = duracion / 60;
  var incremento = destino / (duracion / (1000 / 60));
  var actual = 0;
  var timer = setInterval(function() {
    actual += incremento;
    if (actual >= destino) { actual = destino; clearInterval(timer); }
    el.textContent = Math.round(actual).toLocaleString('es-MX');
  }, paso);
}

// ── Dona SVG ──────────────────────────────────────────────────
function dibujarDona(svgId, leyId, datos, colores) {
  var svg = document.getElementById(svgId);
  var ley = document.getElementById(leyId);
  if (!svg || !datos.length) return;

  var total = datos.reduce(function(a,b){ return a + parseInt(b.total); }, 0);
  if (total === 0) return;

  var cx = 100, cy = 100, r = 75, ri = 45;
  var angulo = -Math.PI / 2;
  var html = '';

  datos.forEach(function(d, i) {
    var pct    = parseInt(d.total) / total;
    var span   = pct * 2 * Math.PI;
    var x1     = cx + r * Math.cos(angulo);
    var y1     = cy + r * Math.sin(angulo);
    var x2     = cx + r * Math.cos(angulo + span);
    var y2     = cy + r * Math.sin(angulo + span);
    var xi1    = cx + ri * Math.cos(angulo);
    var yi1    = cy + ri * Math.sin(angulo);
    var xi2    = cx + ri * Math.cos(angulo + span);
    var yi2    = cy + ri * Math.sin(angulo + span);
    var large  = span > Math.PI ? 1 : 0;
    var path   = 'M '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+
                 ' L '+xi2+' '+yi2+' A '+ri+' '+ri+' 0 '+large+' 0 '+xi1+' '+yi1+' Z';
    var color  = colores[i % colores.length];
    svg.innerHTML += '<path d="'+path+'" fill="'+color+'" opacity="0.9"/>';
    angulo += span;

    html += '<div class="dona-ley-item">' +
      '<span class="dona-ley-dot" style="background:'+color+'"></span>' +
      '<span>'+(d.estado || d.tipo || d.label)+'</span>' +
      '<span class="dona-ley-num">'+parseInt(d.total).toLocaleString('es-MX')+'</span>' +
    '</div>';
  });

  // Texto central
  svg.innerHTML += '<circle cx="100" cy="100" r="38" fill="white"/>' +
    '<text x="100" y="96" text-anchor="middle" font-size="22" font-weight="800" fill="'+colores[0]+'" font-family="Montserrat,sans-serif">'+total.toLocaleString('es-MX')+'</text>' +
    '<text x="100" y="112" text-anchor="middle" font-size="9" fill="#888" font-family="Montserrat,sans-serif">TOTAL</text>';

  ley.innerHTML = html;
}

// ── Barras apiladas ───────────────────────────────────────────
function dibujarBarras(datos) {
  var wrap = document.getElementById('panel-barras');
  if (!datos || !datos.length) { wrap.innerHTML = '<p style="color:var(--texto-suave);font-size:.82rem;padding:1rem">Sin datos.</p>'; return; }

  var maxTotal = Math.max.apply(null, datos.map(function(d){ return parseInt(d.total)||0; }));
  var altMax   = 160;

  var html = '<div class="panel-barras">';
  datos.forEach(function(d) {
    var pend = parseInt(d.pendientes) || 0;
    var parc = parseInt(d.parciales)  || 0;
    var cub  = parseInt(d.cubiertas)  || 0;
    var tot  = pend + parc + cub;
    var scale = maxTotal > 0 ? altMax / maxTotal : 0;

    html += '<div class="barra-grupo">' +
      '<div class="barra-stack" style="height:'+(tot*scale)+'px">' +
        '<div class="barra-seg" style="height:'+(pend*scale)+'px;background:#dc2626;" title="Pendientes: '+pend+'"></div>' +
        '<div class="barra-seg" style="height:'+(parc*scale)+'px;background:#f59e0b;" title="Parciales: '+parc+'"></div>' +
        '<div class="barra-seg" style="height:'+(cub*scale)+'px;background:#009933;"  title="Cubiertas: '+cub+'"></div>' +
      '</div>' +
      '<span class="barra-label" title="'+d.escuela+'">'+d.escuela+'</span>' +
    '</div>';
  });
  html += '</div>';
  wrap.innerHTML = html;
}

// ── Cargar datos ──────────────────────────────────────────────
fetch('/api/admin/panel/metricas')
  .then(function(r){ return r.json(); })
  .then(function(data) {
    var n = data.necesidades;
    var s = data.solicitudes;

    // Métricas
    var metricas = [
      {
        clase: 'pm-verde',
        icono: 'bi-box-seam-fill',
        valor: parseInt(n.total),
        label: 'Total Necesidades',
        sub:   parseInt(n.cubiertas) + ' cubiertas',
        pill:  { texto: Math.round(parseInt(n.cubiertas)/parseInt(n.total)*100)+'%', clase: 'pill-verde' }
      },
      {
        clase: 'pm-azul',
        icono: 'bi-check-circle-fill',
        valor: parseInt(n.cubiertas),
        label: 'Necesidades Cubiertas',
        sub:   parseInt(n.parciales) + ' parcialmente',
        pill:  { texto: parseInt(n.parciales) + ' parciales', clase: 'pill-naranja' }
      },
      {
        clase: 'pm-naranja',
        icono: 'bi-inbox-fill',
        valor: parseInt(s.nuevas),
        label: 'Solicitudes Pendientes',
        sub:   'de ' + parseInt(s.total) + ' totales',
        pill:  { texto: parseInt(s.nuevas) + ' nuevas', clase: 'pill-naranja' }
      },
      {
        clase: 'pm-rojo',
        icono: 'bi-exclamation-circle-fill',
        valor: parseInt(n.pendientes),
        label: 'Necesidades Pendientes',
        sub:   'aún sin cubrir',
        pill:  { texto: Math.round(parseInt(n.pendientes)/parseInt(n.total)*100)+'% sin cubrir', clase: 'pill-rojo' }
      }
    ];

    var wrap = document.getElementById('panel-metricas');
    wrap.innerHTML = metricas.map(function(m) {
      return '<div class="panel-metric-card '+m.clase+'">' +
        '<div class="panel-metric-icono"><i class="bi '+m.icono+'"></i></div>' +
        '<div class="panel-metric-valor" data-val="'+m.valor+'">0</div>' +
        '<div class="panel-metric-label">'+m.label+'</div>' +
        '<div class="panel-metric-sub">' +
          '<span class="panel-metric-pill '+m.pill.clase+'">'+m.pill.texto+'</span>' +
          m.sub +
        '</div>' +
      '</div>';
    }).join('');

    // Animar números
    wrap.querySelectorAll('.panel-metric-valor').forEach(function(el) {
      animarNumero(el, parseInt(el.dataset.val), 800);
    });

    // Gráfica barras
    dibujarBarras(data.porEscuela);

    // Dona necesidades
    var coloresNec = ['#dc2626','#f59e0b','#009933','#9ca3af'];
    var datosNec = data.porEstado.map(function(d){ return { estado: d.estado, total: d.total }; });
    dibujarDona('panel-dona', 'panel-dona-ley', datosNec, coloresNec);

    // Dona solicitudes
    var datosSol = [
      { label: 'Material',  tipo: 'Material',  total: parseInt(s.material) },
      { label: 'Otros',     tipo: 'Otros',     total: parseInt(s.otras)    },
      { label: 'Nuevas',    tipo: 'Nuevas',    total: parseInt(s.nuevas)   },
      { label: 'Leídas',    tipo: 'Leídas',    total: parseInt(s.leidas)   },
      { label: 'Archivadas',tipo: 'Archivadas',total: parseInt(s.archivadas)}
    ].filter(function(d){ return d.total > 0; });
    var coloresSol = ['#1C3661','#f59e0b','#EC671B','#009933','#9ca3af'];
    dibujarDona('panel-dona-sol', 'panel-dona-sol-ley', datosSol, coloresSol);

    // Donadores
    var donTotal = document.getElementById('panel-don-total');
    if (donTotal) donTotal.textContent = data.donadores.length + ' registrados';
    var donLista = document.getElementById('panel-donadores');
    if (data.donadores.length === 0) {
      donLista.innerHTML = '<p style="color:var(--texto-suave);font-size:.82rem;padding:.5rem">Sin donadores registrados.</p>';
    } else {
      donLista.innerHTML = data.donadores.map(function(d) {
        var inicial = (d.nombre_completo || 'D').charAt(0).toUpperCase();
        return '<div class="panel-don-item">' +
          '<div class="panel-don-avatar">'+inicial+'</div>' +
          '<div class="panel-don-info">' +
            '<p class="panel-don-nombre">'+d.nombre_completo+'</p>' +
            '<p class="panel-don-correo">'+(d.correo||'—')+'</p>' +
          '</div>' +
        '</div>';
      }).join('');
    }
  })
  .catch(function(err) {
    console.error(err);
    document.getElementById('panel-metricas').innerHTML =
      '<p style="color:#dc2626;font-size:.85rem;grid-column:1/-1">Error al cargar métricas.</p>';
