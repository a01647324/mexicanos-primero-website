<div class="panel-wrap">

  <!-- ENCABEZADO -->
  <div class="panel-top">
    <div>
      <h1 class="panel-titulo">Panel General</h1>
      <p class="panel-subtitulo">Resumen de actividad de Mi Escuela Primero</p>

  </div>

  <!-- MÉTRICAS -->
  <div class="panel-metricas" id="panel-metricas">
    <div class="panel-metric-skeleton"></div>
    <div class="panel-metric-skeleton"></div>
    <div class="panel-metric-skeleton"></div>
    <div class="panel-metric-skeleton"></div>
  </div>

  <!-- GRÁFICAS -->
  <div class="panel-graficas">

    <!-- Barras: necesidades por escuela -->

          <h3 class="panel-chart-titulo">Necesidades por Escuela</h3>

    <!-- Dona: distribución por estado -->
    <div class="panel-chart-card panel-chart-chico">
      <div class="panel-chart-header">
        <div>
          <h3 class="panel-chart-titulo">Estado de Necesidades</h3>
          <p class="panel-chart-sub">Distribución general</p>
        </div>
      </div>
      <div class="panel-dona-wrap">

<style>
/* ── PANEL GENERAL ── */
.panel-wrap {
  font-family: 'Montserrat', sans-serif;
  color: var(--texto);
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

/* TOP */
.panel-top {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
}
.panel-titulo {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--texto);
  margin: 0 0 0.2rem;
  letter-spacing: -0.6px;
}
.panel-subtitulo {
  font-size: 0.82rem;
  color: var(--texto-suave);
  margin: 0;
  font-weight: 400;
}
.panel-fecha {
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--texto-suave);
  background: var(--blanco);
  border: 1px solid var(--gris-borde);
  padding: 0.38rem 0.85rem;
  border-radius: var(--radio-xl);
}

/* MÉTRICAS */
.panel-metricas {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.85rem;
}
.panel-metric-card {
  background: var(--blanco);
  border-radius: var(--radio-lg);
  padding: 1.2rem 1.35rem;
  box-shadow: var(--sombra);
  border: 1px solid var(--gris-borde);
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
  position: relative;
  overflow: hidden;
  transition: var(--t);
}
.panel-metric-card:hover { box-shadow: var(--sombra-m); transform: translateY(-2px); }
.panel-metric-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.pm-verde::before   { background: linear-gradient(90deg, var(--verde-oscuro), var(--verde)); }
.pm-azul::before    { background: linear-gradient(90deg, var(--azul), #3b6dc7); }
.pm-naranja::before { background: linear-gradient(90deg, var(--naranja), var(--amarillo)); }
.pm-rojo::before    { background: linear-gradient(90deg, #c0392b, #e74c3c); }

.panel-metric-icono {
  width: 38px; height: 38px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
}
.pm-verde   .panel-metric-icono { background: var(--verde-suave);   color: var(--verde-oscuro); }
.pm-azul    .panel-metric-icono { background: var(--azul-suave);    color: var(--azul); }
.pm-naranja .panel-metric-icono { background: var(--naranja-suave); color: var(--naranja); }
.pm-rojo    .panel-metric-icono { background: var(--rojo-suave);    color: var(--rojo); }

.panel-metric-valor {
  font-size: 1.85rem;
  font-weight: 800;
  color: var(--texto);
  line-height: 1;
  letter-spacing: -0.8px;
}
.panel-metric-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--texto-suave);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.panel-metric-sub {
  font-size: 0.7rem;
  color: var(--texto-suave);
  display: flex;
  align-items: center;
  gap: 0.3rem;
  flex-wrap: wrap;
}
.panel-metric-pill {
  display: inline-flex; align-items: center; gap: 0.2rem;
  padding: 0.13rem 0.5rem;
  border-radius: var(--radio-xl);
  font-size: 0.67rem; font-weight: 700;
}
.pill-verde   { background: var(--verde-suave);   color: var(--verde-oscuro); }
.pill-naranja { background: var(--naranja-suave);  color: #b84f10; }
.pill-rojo    { background: var(--rojo-suave);     color: var(--rojo); }
.pill-azul    { background: var(--azul-suave);     color: var(--azul); }

.panel-metric-skeleton {
  background: var(--gris-claro);
  border-radius: var(--radio-lg);
  height: 130px;
  animation: shimmer 1.4s infinite;
}
@keyframes shimmer { 0%,100%{ opacity:1 } 50%{ opacity:0.45 } }

/* GRÁFICAS */
.panel-graficas {
  display: grid;
  grid-template-columns: 1fr 210px 210px;
  gap: 0.85rem;
  align-items: start;
}
.panel-chart-card {
  background: var(--blanco);
  border-radius: var(--radio-lg);
  padding: 1.35rem;
  box-shadow: var(--sombra);
  border: 1px solid var(--gris-borde);
  transition: var(--t);
}
.panel-chart-card:hover { box-shadow: var(--sombra-m); }
.panel-chart-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 1.1rem; gap: 0.75rem; flex-wrap: wrap;
}
.panel-chart-titulo {
  font-size: 0.92rem; font-weight: 700; color: var(--texto); margin: 0 0 0.15rem;
}
.panel-chart-sub { font-size: 0.72rem; color: var(--texto-suave); margin: 0; }
.panel-chart-leyenda { display: flex; gap: 0.65rem; flex-wrap: wrap; }
.ley-item {
  display: flex; align-items: center; gap: 0.3rem;
  font-size: 0.7rem; font-weight: 600; color: var(--texto-suave);
}
.ley-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Barras */
.panel-barras-wrap { overflow-x: auto; padding-bottom: 0.4rem; }
.panel-barras {
  display: flex; align-items: flex-end; gap: 0.5rem;
  min-height: 160px; padding: 0 0.2rem;
}
.barra-grupo {
  display: flex; flex-direction: column; align-items: center;
  gap: 0.28rem; flex: 1; min-width: 52px;
}
.barra-stack {
  display: flex; flex-direction: column-reverse;
  width: 100%; border-radius: 6px; overflow: hidden; min-height: 4px;
  transition: all 0.4s ease;
}
.barra-seg { transition: height 0.55s cubic-bezier(0.4,0,0.2,1); }
.barra-label {
  font-size: 0.58rem; font-weight: 600; color: var(--texto-suave);
  text-align: center; line-height: 1.2;
  max-width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Dona */
.panel-dona-wrap {
  display: flex; align-items: center; gap: 0.85rem;
  flex-wrap: wrap; justify-content: center;
}
.panel-dona-leyenda { display: flex; flex-direction: column; gap: 0.38rem; font-size: 0.7rem; }
.dona-ley-item {
  display: flex; align-items: center; gap: 0.38rem;
  color: var(--texto); font-weight: 500;
}
.dona-ley-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dona-ley-num { font-weight: 700; margin-left: auto; padding-left: 0.5rem; }

/* Donadores */
.panel-donadores-card {
  background: var(--blanco);
  border-radius: var(--radio-lg);
  padding: 1.35rem;
  box-shadow: var(--sombra);
  border: 1px solid var(--gris-borde);
}
.panel-donadores-total {
  font-size: 0.73rem; font-weight: 700; color: var(--texto-suave);
  background: var(--gris-claro); padding: 0.28rem 0.7rem; border-radius: var(--radio-xl);
}
.panel-donadores-lista {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0.5rem;
  max-height: 260px; overflow-y: auto; padding-right: 0.2rem;
  margin-top: 0.85rem;
}
.panel-donadores-lista::-webkit-scrollbar { width: 4px; }
.panel-donadores-lista::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.09); border-radius: 3px; }
.panel-don-item {
  display: flex; align-items: center; gap: 0.65rem;
  padding: 0.6rem 0.8rem;
  background: var(--crema); border-radius: 9px;
  border: 1px solid var(--gris-claro);
  transition: var(--t);
}
.panel-don-item:hover { background: var(--verde-suave); border-color: rgba(0,153,51,0.15); }
.panel-don-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--azul); color: white;
  font-weight: 700; font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.panel-don-info { min-width: 0; }
.panel-don-nombre {
  font-size: 0.79rem; font-weight: 600; color: var(--texto);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.panel-don-correo {
  font-size: 0.68rem; color: var(--texto-suave);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.panel-cargando { padding: 2rem; text-align: center; color: var(--texto-suave); font-size: 1.3rem; }
.spin { display: inline-block; animation: girar 1s linear infinite; }
@keyframes girar { to { transform: rotate(360deg); } }

@media (max-width: 1100px) {
  .panel-metricas { grid-template-columns: repeat(2,1fr); }
  .panel-graficas { grid-template-columns: 1fr 1fr; }
  .panel-chart-grande { grid-column: 1 / -1; }
}
@media (max-width: 640px) {
  .panel-metricas { grid-template-columns: 1fr 1fr; }
  .panel-graficas { grid-template-columns: 1fr; }
}
</style>

<script>
// ── Fecha ─────────────────────────────────────────────────────
(function() {
  var d = new Date();
  var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var dias  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  document.getElementById('panel-fecha').textContent =
    dias[d.getDay()] + ', ' + d.getDate() + ' ' + meses[d.getMonth()] + ' ' + d.getFullYear();
})();

// ── Animar número ─────────────────────────────────────────────
function animarNumero(el, destino, duracion) {
  var inicio = 0;
  var paso   = duracion / 60;
  var incremento = destino / (duracion / (1000 / 60));
  var actual = 0;
  var timer = setInterval(function() {
    actual += incremento;
    if (actual >= destino) { actual = destino; clearInterval(timer); }
    el.textContent = Math.round(actual).toLocaleString('es-MX');
  }, paso);
}

// ── Dona SVG ──────────────────────────────────────────────────
function dibujarDona(svgId, leyId, datos, colores) {
  var svg = document.getElementById(svgId);
  var ley = document.getElementById(leyId);
  if (!svg || !datos.length) return;

  var total = datos.reduce(function(a,b){ return a + parseInt(b.total); }, 0);
  if (total === 0) return;

  var cx = 100, cy = 100, r = 75, ri = 45;
  var angulo = -Math.PI / 2;
  var html = '';

  datos.forEach(function(d, i) {
    var pct    = parseInt(d.total) / total;
    var span   = pct * 2 * Math.PI;
    var x1     = cx + r * Math.cos(angulo);
    var y1     = cy + r * Math.sin(angulo);
    var x2     = cx + r * Math.cos(angulo + span);
    var y2     = cy + r * Math.sin(angulo + span);
    var xi1    = cx + ri * Math.cos(angulo);
    var yi1    = cy + ri * Math.sin(angulo);
    var xi2    = cx + ri * Math.cos(angulo + span);
    var yi2    = cy + ri * Math.sin(angulo + span);
    var large  = span > Math.PI ? 1 : 0;
    var path   = 'M '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+
                 ' L '+xi2+' '+yi2+' A '+ri+' '+ri+' 0 '+large+' 0 '+xi1+' '+yi1+' Z';
    var color  = colores[i % colores.length];
    svg.innerHTML += '<path d="'+path+'" fill="'+color+'" opacity="0.9"/>';
    angulo += span;

    html += '<div class="dona-ley-item">' +
      '<span class="dona-ley-dot" style="background:'+color+'"></span>' +
      '<span>'+(d.estado || d.tipo || d.label)+'</span>' +
      '<span class="dona-ley-num">'+parseInt(d.total).toLocaleString('es-MX')+'</span>' +
    '</div>';
  });

  // Texto central
  svg.innerHTML += '<circle cx="100" cy="100" r="38" fill="white"/>' +
    '<text x="100" y="96" text-anchor="middle" font-size="22" font-weight="800" fill="'+colores[0]+'" font-family="Montserrat,sans-serif">'+total.toLocaleString('es-MX')+'</text>' +
    '<text x="100" y="112" text-anchor="middle" font-size="9" fill="#888" font-family="Montserrat,sans-serif">TOTAL</text>';

  ley.innerHTML = html;
}

// ── Barras apiladas ───────────────────────────────────────────
function dibujarBarras(datos) {
  var wrap = document.getElementById('panel-barras');
  if (!datos || !datos.length) { wrap.innerHTML = '<p style="color:var(--texto-suave);font-size:.82rem;padding:1rem">Sin datos.</p>'; return; }

  var maxTotal = Math.max.apply(null, datos.map(function(d){ return parseInt(d.total)||0; }));
  var altMax   = 160;

  var html = '<div class="panel-barras">';
  datos.forEach(function(d) {
    var pend = parseInt(d.pendientes) || 0;
    var parc = parseInt(d.parciales)  || 0;
    var cub  = parseInt(d.cubiertas)  || 0;
    var tot  = pend + parc + cub;
    var scale = maxTotal > 0 ? altMax / maxTotal : 0;

    html += '<div class="barra-grupo">' +
      '<div class="barra-stack" style="height:'+(tot*scale)+'px">' +
        '<div class="barra-seg" style="height:'+(pend*scale)+'px;background:#dc2626;" title="Pendientes: '+pend+'"></div>' +
        '<div class="barra-seg" style="height:'+(parc*scale)+'px;background:#f59e0b;" title="Parciales: '+parc+'"></div>' +
        '<div class="barra-seg" style="height:'+(cub*scale)+'px;background:#009933;"  title="Cubiertas: '+cub+'"></div>' +
      '</div>' +
      '<span class="barra-label" title="'+d.escuela+'">'+d.escuela+'</span>' +
    '</div>';
  });
  html += '</div>';
  wrap.innerHTML = html;
}

// ── Cargar datos ──────────────────────────────────────────────
fetch('/api/admin/panel/metricas')
  .then(function(r){ return r.json(); })
  .then(function(data) {
    var n = data.necesidades;
    var s = data.solicitudes;

    // Métricas
    var metricas = [
      {
        clase: 'pm-verde',
        icono: 'bi-box-seam-fill',
        valor: parseInt(n.total),
        label: 'Total Necesidades',
        sub:   parseInt(n.cubiertas) + ' cubiertas',
        pill:  { texto: Math.round(parseInt(n.cubiertas)/parseInt(n.total)*100)+'%', clase: 'pill-verde' }
      },
      {
        clase: 'pm-azul',
        icono: 'bi-check-circle-fill',
        valor: parseInt(n.cubiertas),
        label: 'Necesidades Cubiertas',
        sub:   parseInt(n.parciales) + ' parcialmente',
        pill:  { texto: parseInt(n.parciales) + ' parciales', clase: 'pill-naranja' }
      },
      {
        clase: 'pm-naranja',
        icono: 'bi-inbox-fill',
        valor: parseInt(s.nuevas),
        label: 'Solicitudes Pendientes',
        sub:   'de ' + parseInt(s.total) + ' totales',
        pill:  { texto: parseInt(s.nuevas) + ' nuevas', clase: 'pill-naranja' }
      },
      {
        clase: 'pm-rojo',
        icono: 'bi-exclamation-circle-fill',
        valor: parseInt(n.pendientes),
        label: 'Necesidades Pendientes',
        sub:   'aún sin cubrir',
        pill:  { texto: Math.round(parseInt(n.pendientes)/parseInt(n.total)*100)+'% sin cubrir', clase: 'pill-rojo' }
      }
    ];

    var wrap = document.getElementById('panel-metricas');
    wrap.innerHTML = metricas.map(function(m) {
      return '<div class="panel-metric-card '+m.clase+'">' +
        '<div class="panel-metric-icono"><i class="bi '+m.icono+'"></i></div>' +
        '<div class="panel-metric-valor" data-val="'+m.valor+'">0</div>' +
        '<div class="panel-metric-label">'+m.label+'</div>' +
        '<div class="panel-metric-sub">' +
          '<span class="panel-metric-pill '+m.pill.clase+'">'+m.pill.texto+'</span>' +
          m.sub +
        '</div>' +
      '</div>';
    }).join('');

    // Animar números
    wrap.querySelectorAll('.panel-metric-valor').forEach(function(el) {
      animarNumero(el, parseInt(el.dataset.val), 800);
    });

    // Gráfica barras
    dibujarBarras(data.porEscuela);

    // Dona necesidades
    var coloresNec = ['#dc2626','#f59e0b','#009933','#9ca3af'];
    var datosNec = data.porEstado.map(function(d){ return { estado: d.estado, total: d.total }; });
    dibujarDona('panel-dona', 'panel-dona-ley', datosNec, coloresNec);

    // Dona solicitudes
    var datosSol = [
      { label: 'Material',  tipo: 'Material',  total: parseInt(s.material) },
      { label: 'Otros',     tipo: 'Otros',     total: parseInt(s.otras)    },
      { label: 'Nuevas',    tipo: 'Nuevas',    total: parseInt(s.nuevas)   },
      { label: 'Leídas',    tipo: 'Leídas',    total: parseInt(s.leidas)   },
      { label: 'Archivadas',tipo: 'Archivadas',total: parseInt(s.archivadas)}
    ].filter(function(d){ return d.total > 0; });
    var coloresSol = ['#1C3661','#f59e0b','#EC671B','#009933','#9ca3af'];
    dibujarDona('panel-dona-sol', 'panel-dona-sol-ley', datosSol, coloresSol);

    // Donadores
    var donTotal = document.getElementById('panel-don-total');
    if (donTotal) donTotal.textContent = data.donadores.length + ' registrados';
    var donLista = document.getElementById('panel-donadores');
    if (data.donadores.length === 0) {
      donLista.innerHTML = '<p style="color:var(--texto-suave);font-size:.82rem;padding:.5rem">Sin donadores registrados.</p>';
    } else {
      donLista.innerHTML = data.donadores.map(function(d) {
        var inicial = (d.nombre_completo || 'D').charAt(0).toUpperCase();
        return '<div class="panel-don-item">' +
          '<div class="panel-don-avatar">'+inicial+'</div>' +
          '<div class="panel-don-info">' +
            '<p class="panel-don-nombre">'+d.nombre_completo+'</p>' +
            '<p class="panel-don-correo">'+(d.correo||'—')+'</p>' +
          '</div>' +
        '</div>';
      }).join('');
    }
  })
  .catch(function(err) {
    console.error(err);
    document.getElementById('panel-metricas').innerHTML =
      '<p style="color:#dc2626;font-size:.85rem;grid-column:1/-1">Error al cargar métricas.</p>';
  });
</script>
