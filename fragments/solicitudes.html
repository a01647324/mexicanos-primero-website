<div class="seccion-necesidades">

  <div class="subpagina-header">
    <h1 class="subpagina-titulo">Bandeja de Solicitudes</h1>
    <p class="subpagina-subtitulo">Gestiona las solicitudes de donación recibidas.</p>
  </div>

  <div class="bandeja-tabs">
    <button class="bandeja-tab activo" data-tab="nueva"      onclick="solTab(this)"><i class="bi bi-circle-fill"></i> Nuevas <span class="bandeja-tab-badge" id="badge-nueva">0</span></button>
    <button class="bandeja-tab"        data-tab="leida"      onclick="solTab(this)"><i class="bi bi-check-circle-fill"></i> Leídas <span class="bandeja-tab-badge leidas" id="badge-leida">0</span></button>
    <button class="bandeja-tab"        data-tab="archivada"  onclick="solTab(this)"><i class="bi bi-archive-fill"></i> Archivadas <span class="bandeja-tab-badge archivadas" id="badge-archivada">0</span></button>
    <button class="bandeja-tab" data-tab="eliminada" onclick="solTab(this)"><i class="bi bi-trash-fill"></i> Eliminadas <span class="bandeja-tab-badge" style="background:#9ca3af;" id="badge-eliminada">0</span></button>
    <div style="margin-left:auto;">
      <select class="panel-select" style="width:auto;min-width:160px;font-size:0.82rem;" onchange="solFiltrarTipo(this.value)">
        <option value="">Todos los tipos</option>
        <option value="Donación material">Donación material</option>
        <option value="Donación económica">Donación económica</option>
        <option value="Voluntariado">Voluntariado</option>
        <option value="Brindar talleres">Brindar talleres</option>
        <option value="Vinculaciones">Vinculaciones</option>
      </select>
    </div>
  </div>

  <!-- contenedor de cards — el DOM ES la fuente de verdad -->
  <div id="sol-lista"></div>

</div>

<!-- MODAL -->
<div id="sol-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:3000;display:none;align-items:center;justify-content:center;padding:2rem;" onclick="if(event.target===this)solCerrarModal()">
  <div class="modal-caja" style="max-width:620px;width:100%;">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <span id="sol-modal-badge" class="solicitud-tipo-badge">—</span>
        <h2 class="modal-titulo" id="sol-modal-nombre">—</h2>
      </div>
      <button class="modal-cerrar" onclick="solCerrarModal()"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-campo-doble">
        <div class="modal-campo"><span class="modal-label">ID</span><span class="modal-valor" id="sol-modal-id" style="font-family:monospace;color:var(--azul);font-weight:700;">—</span></div>
        <div class="modal-campo"><span class="modal-label">Fecha</span><span class="modal-valor" id="sol-modal-fecha">—</span></div>
      </div>
      <div class="modal-campo-doble">
        <div class="modal-campo"><span class="modal-label">Correo</span><span class="modal-valor" id="sol-modal-correo">—</span></div>
        <div class="modal-campo"><span class="modal-label">Teléfono</span><span class="modal-valor" id="sol-modal-tel">—</span></div>
      </div>
      <div class="modal-campo-doble">
        <div class="modal-campo"><span class="modal-label">Tipo instancia</span><span class="modal-valor" id="sol-modal-inst">—</span></div>
        <div class="modal-campo"><span class="modal-label">Nombre instancia</span><span class="modal-valor" id="sol-modal-inst-nombre">—</span></div>
      </div>
      <div class="modal-campo"><span class="modal-label">Mensaje</span><span class="modal-valor" id="sol-modal-msg">—</span></div>
      <div id="sol-modal-mat-wrap" style="display:none;">
        <span class="modal-label">Materiales</span>
        <div id="sol-modal-mat" style="display:flex;flex-direction:column;gap:0.5rem;margin-top:0.5rem;"></div>
      </div>
    </div>
    <div class="modal-acciones">
      <button class="panel-btn panel-btn-outline-gris" id="sol-modal-btn-archivar" onclick="solModalAccion('archivada')"><i class="bi bi-archive"></i> Archivar</button>
      <button class="panel-btn panel-btn-verde"        id="sol-modal-btn-leida"    onclick="solModalAccion('leida')"><i class="bi bi-check2"></i> Marcar leída</button>
    </div>
  </div>
</div>

<style>
.bandeja-tabs{display:flex;align-items:center;gap:.4rem;margin-bottom:1.25rem;border-bottom:2px solid rgba(0,0,0,.07);padding-bottom:.75rem;flex-wrap:wrap}
.bandeja-tab{display:flex;align-items:center;gap:.45rem;padding:.5rem 1.1rem;border:none;border-radius:50px;background:var(--gris-claro);color:var(--texto-suave);font-family:'Montserrat',sans-serif;font-weight:600;font-size:.82rem;cursor:pointer;transition:all .2s ease}
.bandeja-tab:hover{background:rgba(0,153,51,.08);color:var(--verde-oscuro)}
.bandeja-tab.activo{background:var(--verde-oscuro);color:white}
.bandeja-tab-badge{background:var(--naranja);color:white;font-size:.68rem;font-weight:700;min-width:18px;height:18px;padding:0 5px;border-radius:50px;display:inline-flex;align-items:center;justify-content:center}
.bandeja-tab-badge.leidas{background:var(--verde)}
.bandeja-tab-badge.archivadas{background:#9ca3af}
#sol-lista{display:flex;flex-direction:column;gap:.55rem}
.sol-card{display:flex;align-items:center;gap:1rem;padding:1rem 1.25rem;background:var(--blanco);border-radius:14px;border:1.5px solid rgba(0,153,51,.07);border-left:4px solid var(--naranja);font-family:'Montserrat',sans-serif;transition:opacity .2s,transform .2s}
.sol-card:hover{transform:translateY(-2px);box-shadow:var(--sombra-hover)}
.sol-card[data-estado="leida"]{border-left-color:var(--verde)}
.sol-card[data-estado="archivada"]{border-left-color:#9ca3af;opacity:.75}
.sol-dot{width:10px;height:10px;border-radius:50%;background:var(--naranja);flex-shrink:0}
.sol-card[data-estado="leida"] .sol-dot,
.sol-card[data-estado="archivada"] .sol-dot{background:transparent}
.sol-info{flex:1;min-width:0}
.sol-nombre{font-weight:700;font-size:.9rem;color:var(--texto);margin:0 0 .3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sol-meta{display:flex;gap:1rem;flex-wrap:wrap;font-size:.76rem;color:var(--texto-suave);margin:0}
.sol-meta-item{display:flex;align-items:center;gap:.3rem}
.sol-tipo{display:inline-flex;align-items:center;padding:.25rem .75rem;border-radius:50px;font-size:.72rem;font-weight:700;flex-shrink:0;white-space:nowrap}
.tipo-material{background:rgba(28,54,97,.1);color:#1C3661}
.tipo-economica{background:rgba(244,152,28,.12);color:#c47a0a}
.tipo-voluntariado{background:rgba(0,153,51,.1);color:#007526}
.tipo-talleres{background:rgba(236,103,27,.1);color:#EC671B}
.tipo-vinculacion{background:rgba(100,50,150,.1);color:#6432a0}
.tipo-otro{background:rgba(0,0,0,.06);color:#4A644A}
.sol-acciones{display:flex;gap:.4rem;flex-shrink:0}
.sol-btn{display:inline-flex;align-items:center;gap:.35rem;padding:.4rem .85rem;border:none;border-radius:50px;font-family:'Montserrat',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s ease}
.sol-btn-detalle{background:rgba(28,54,97,.08);color:#1C3661}
.sol-btn-detalle:hover{background:#1C3661;color:white}
.sol-btn-leida{background:rgba(0,153,51,.08);color:var(--verde-oscuro)}
.sol-btn-leida:hover{background:var(--verde);color:white}
.sol-btn-archivar{background:var(--gris-claro);color:var(--texto-suave)}
.sol-btn-archivar:hover{background:#d1d5db;color:var(--texto)}
.sol-btn-x{background:transparent;color:#9ca3af;border:none;border-radius:50%;width:30px;height:30px;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s ease;font-size:.85rem}
.sol-btn-x:hover{background:rgba(220,38,38,.1);color:#dc2626}
.sol-vacio{padding:3rem 1rem;text-align:center;color:var(--texto-suave);font-size:.88rem;font-family:'Montserrat',sans-serif}
.sol-vacio i{display:block;font-size:2.5rem;margin-bottom:.75rem;opacity:.3}
.sol-loading{padding:3rem;text-align:center;color:var(--texto-suave);font-family:'Montserrat',sans-serif}
.spin{display:inline-block;animation:girar 1s linear infinite}
@keyframes girar{to{transform:rotate(360deg)}}
.modal-material-item{padding:.65rem .85rem;background:var(--gris-claro);border-radius:10px;font-size:.82rem}
.modal-material-item strong{display:block;color:var(--texto);margin-bottom:.15rem}
.modal-material-item span{color:var(--texto-suave)}
.solicitud-tipo-badge{display:inline-flex;align-items:center;padding:.25rem .75rem;border-radius:50px;font-size:.72rem;font-weight:700}
</style>

<script>
// ─────────────────────────────────────────────────────────────
// LÓGICA: el DOM es la fuente de verdad.
// No hay variables globales de estado — todo se lee del DOM.
// ─────────────────────────────────────────────────────────────

function solClaseTipo(tipo) {
  if (!tipo) return 'tipo-otro';
  var t = tipo.toLowerCase();
  if (t.includes('material'))     return 'tipo-material';
  if (t.includes('econ'))         return 'tipo-economica';
  if (t.includes('voluntariado')) return 'tipo-voluntariado';
  if (t.includes('taller'))       return 'tipo-talleres';
  if (t.includes('vinculac'))     return 'tipo-vinculacion';
  return 'tipo-otro';
}

function solFecha(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('es-MX', {day:'2-digit',month:'short',year:'numeric'});
}

// ── Tab activo ────────────────────────────────────────────────
function solTab(btn) {
  document.querySelectorAll('.bandeja-tab').forEach(function(b){ b.classList.remove('activo'); });
  btn.classList.add('activo');
  solMostrarTab(btn.dataset.tab);
}

function solTabActual() {
  var activo = document.querySelector('.bandeja-tab.activo');
  return activo ? activo.dataset.tab : 'nueva';
}

// Muestra/oculta cards según tab y filtro de tipo
function solMostrarTab(tab) {
  var tipo = document.querySelector('#sol-lista').dataset.filtroTipo || '';
  var cards = document.querySelectorAll('.sol-card');
  var counts = {nueva:0, leida:0, archivada:0, eliminada:0};

  // Contar todos (independiente del tab)
  cards.forEach(function(c){
    var e = c.dataset.estado;
    if (counts[e] !== undefined) counts[e]++;
  });
  document.getElementById('badge-nueva').textContent     = counts.nueva;
  document.getElementById('badge-leida').textContent     = counts.leida;
  document.getElementById('badge-archivada').textContent = counts.archivada;
  document.getElementById('badge-eliminada').textContent = counts.eliminada;

  // Actualizar badge header y sidebar
  var hb = document.querySelector('.admin-badge');
  if (hb) hb.textContent = counts.nueva;
  var sb = document.querySelector('.sidebar-link[data-section="solicitudes"] .sidebar-contador');
  if (sb) sb.textContent = counts.nueva;

  // Mostrar/ocultar según tab y tipo
  cards.forEach(function(c){
    var okTab  = c.dataset.estado === tab;
    var okTipo = !tipo || c.dataset.tipo === tipo;
    c.style.display = (okTab && okTipo) ? '' : 'none';
  });

  // Mensaje vacío
  var lista = document.getElementById('sol-lista');
  var visible = Array.from(cards).filter(function(c){ return c.style.display !== 'none'; });
  var vacio = lista.querySelector('.sol-vacio');
  if (visible.length === 0) {
    if (!vacio) {
      var d = document.createElement('div');
      d.className = 'sol-vacio';
      d.innerHTML = '<i class="bi bi-inbox"></i>No hay solicitudes en esta sección.';
      lista.appendChild(d);
    }
  } else {
    if (vacio) vacio.remove();
  }
}

function solFiltrarTipo(tipo) {
  document.getElementById('sol-lista').dataset.filtroTipo = tipo;
  solMostrarTab(solTabActual());
}

// ── Cambiar estado de una card — DOM first, fetch after ───────
function solCambiarEstado(id, nuevoEstado) {
  var card = document.querySelector('.sol-card[data-id="' + id + '"]');
  if (!card) return;

  // 1. Actualizar data-estado
  card.dataset.estado = nuevoEstado;

  // 2. Actualizar clase visual
  card.className = 'sol-card';
  if (nuevoEstado === 'leida')     card.classList.add('leida');
  if (nuevoEstado === 'archivada') card.classList.add('archivada');
  if (nuevoEstado === 'eliminada') card.classList.add('eliminada');

  // 3. Regenerar botones según nuevo estado
  var btnNueva    = nuevoEstado !== 'nueva'
    ? '<button class="sol-btn sol-btn-archivar" onclick="solAccion(event,'+id+',\'nueva\')" title="Mover a nuevas"><i class="bi bi-arrow-counterclockwise"></i></button>'
    : '';
  var btnLeida    = nuevoEstado !== 'leida'
    ? '<button class="sol-btn sol-btn-leida" onclick="solAccion(event,'+id+',\'leida\')" title="Marcar leída"><i class="bi bi-check2"></i></button>'
    : '';
  var btnArchivar = nuevoEstado !== 'archivada'
    ? '<button class="sol-btn sol-btn-archivar" onclick="solAccion(event,'+id+',\'archivada\')" title="Archivar"><i class="bi bi-archive"></i></button>'
    : '';
  var btnX = nuevoEstado !== 'eliminada'
    ? '<button class="sol-btn-x" onclick="solEliminar(event,'+id+')" title="Quitar de bandeja"><i class="bi bi-x"></i></button>'
    : '';

  if (nuevoEstado === 'eliminada') {
    btnNueva    = '<button class="sol-btn sol-btn-leida" onclick="solAccion(event,'+id+',\'nueva\')" title="Restaurar"><i class="bi bi-arrow-counterclockwise"></i> Restaurar</button>';
    btnLeida    = '';
    btnArchivar = '';
  }

  var acciones = card.querySelector('.sol-acciones');
  if (acciones) {
    acciones.innerHTML =
      '<button class="sol-btn sol-btn-detalle" onclick="solAbrirModal('+id+')"><i class="bi bi-eye"></i> Ver detalle</button>' +
      btnNueva + btnLeida + btnArchivar + btnX;
  }

  // 4. Re-aplicar visibilidad del tab actual
  solMostrarTab(solTabActual());

  // 5. Persistir en background (solo estados válidos para la BD)
  if (nuevoEstado !== 'eliminada') {
    fetch('/api/admin/solicitudes/' + id + '/estado', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({estado_lectura: nuevoEstado})
    }).catch(function(e){ console.error(e); });
  }
}

// ── Eliminar card del DOM ─────────────────────────────────────
function solEliminar(e, id) {
  e.stopPropagation();
  solCambiarEstado(id, 'eliminada');
}

// ── Acción rápida desde botón en card ────────────────────────
function solAccion(e, id, estado) {
  e.stopPropagation();
  solCambiarEstado(id, estado);
}

// ── Modal ─────────────────────────────────────────────────────
function solAbrirModal(id) {
  var card = document.querySelector('.sol-card[data-id="' + id + '"]');
  if (!card) return;

  document.getElementById('sol-modal-id').textContent          = '#' + id;
  document.getElementById('sol-modal-nombre').textContent      = card.dataset.nombre     || '—';
  document.getElementById('sol-modal-fecha').textContent       = card.dataset.fecha      || '—';
  document.getElementById('sol-modal-correo').textContent      = card.dataset.correo     || '—';
  document.getElementById('sol-modal-tel').textContent         = card.dataset.tel        || '—';
  document.getElementById('sol-modal-inst').textContent        = card.dataset.inst       || '—';
  document.getElementById('sol-modal-inst-nombre').textContent = card.dataset.instNombre || '—';
  document.getElementById('sol-modal-msg').textContent         = card.dataset.msg        || '—';

  var badge = document.getElementById('sol-modal-badge');
  badge.textContent = card.dataset.tipo || 'Sin tipo';
  badge.className   = 'solicitud-tipo-badge ' + solClaseTipo(card.dataset.tipo);

  var estado = card.dataset.estado;
  document.getElementById('sol-modal-btn-leida').style.display    = estado === 'leida'     ? 'none' : '';
  document.getElementById('sol-modal-btn-archivar').style.display = estado === 'archivada' ? 'none' : '';

  // Guardar id activo en el modal
  document.getElementById('sol-modal').dataset.id = id;

  // Materiales
  var matWrap = document.getElementById('sol-modal-mat-wrap');
  var matDiv  = document.getElementById('sol-modal-mat');
  if (card.dataset.origen === 'pasos') {
    matWrap.style.display = 'block';
    matDiv.innerHTML = '<p style="font-size:.82rem;color:var(--texto-suave)">Cargando...</p>';
    fetch('/api/admin/solicitudes/' + id + '/materiales')
      .then(function(r){ return r.json(); })
      .then(function(data){
        matDiv.innerHTML = (data.data||[]).map(function(m){
          return '<div class="modal-material-item"><strong>'+(m.escuela||'—')+'</strong><span>'+m.propuesta+' — '+m.cantidad+' '+(m.unidad||'')+'</span></div>';
        }).join('') || '<p style="font-size:.82rem;color:var(--texto-suave)">Sin materiales.</p>';
      }).catch(function(){ matWrap.style.display='none'; });
  } else {
    matWrap.style.display = 'none';
  }

  document.getElementById('sol-modal').style.display = 'flex';

  // Auto-marcar leída al abrir si es nueva
  if (!estado || estado === 'nueva') {
    solCambiarEstado(id, 'leida');
    document.getElementById('sol-modal-btn-leida').style.display = 'none';
  }
}

function solModalAccion(estado) {
  var id = document.getElementById('sol-modal').dataset.id;
  if (!id) return;
  solCambiarEstado(id, estado);
  solCerrarModal();
}

function solCerrarModal() {
  document.getElementById('sol-modal').style.display = 'none';
}

// ── Construir card HTML ───────────────────────────────────────
function solBuildCard(s) {
  var estado = s.estado_lectura || 'nueva';
  var tipo   = s.tipo_donacion  || '';
  var claseEstado = estado === 'leida' ? ' leida' : estado === 'archivada' ? ' archivada' : '';
  var badgeMat = (s.origen_formulario === 'pasos' && !s.tipo_donacion)
    ? '<span style="font-size:.75rem;font-weight:700;color:var(--azul);background:rgba(28,54,97,.08);padding:.2rem .6rem;border-radius:50px;white-space:nowrap;"><i class="bi bi-box-seam"></i> Material</span>'
    : '';
  var btnNueva    = estado !== 'nueva'
    ? '<button class="sol-btn sol-btn-archivar" onclick="solAccion(event,'+s.id+',\'nueva\')"     title="Mover a nuevas"><i class="bi bi-arrow-counterclockwise"></i></button>'
    : '';
  var btnLeida    = estado !== 'leida'
    ? '<button class="sol-btn sol-btn-leida"    onclick="solAccion(event,'+s.id+',\'leida\')"     title="Marcar leída"><i class="bi bi-check2"></i></button>'
    : '';
  var btnArchivar = estado !== 'archivada'
    ? '<button class="sol-btn sol-btn-archivar" onclick="solAccion(event,'+s.id+',\'archivada\')" title="Archivar"><i class="bi bi-archive"></i></button>'
    : '';

  if (estado === 'eliminada') {
    btnNueva    = '<button class="sol-btn sol-btn-leida" onclick="solAccion(event,'+s.id+',\'nueva\')" title="Restaurar"><i class="bi bi-arrow-counterclockwise"></i> Restaurar</button>';
    btnLeida    = '';
    btnArchivar = '';
  }

  return '<div class="sol-card'+claseEstado+'" '+
    'data-id="'+s.id+'" '+
    'data-estado="'+estado+'" '+
    'data-tipo="'+(tipo)+'" '+
    'data-nombre="'+(s.nombre_completo||'').replace(/"/g,'&quot;')+'" '+
    'data-fecha="'+solFecha(s.created_at)+'" '+
    'data-correo="'+(s.correo||'')+'" '+
    'data-tel="'+(s.telefono||'')+'" '+
    'data-inst="'+(s.tipo_instancia||'')+'" '+
    'data-inst-nombre="'+(s.nombre_instancia||'')+'" '+
    'data-msg="'+(s.mensaje||'').replace(/"/g,'&quot;')+'" '+
    'data-origen="'+(s.origen_formulario||'')+'">' +
    '<div class="sol-dot"></div>' +
    '<div class="sol-info">' +
      '<p class="sol-nombre">'+(s.nombre_completo||'—')+'</p>' +
      '<div class="sol-meta">' +
        '<span class="sol-meta-item"><i class="bi bi-calendar3"></i> '+solFecha(s.created_at)+'</span>' +
        (s.correo   ? '<span class="sol-meta-item"><i class="bi bi-envelope"></i> '+s.correo+'</span>'    : '') +
        (s.telefono ? '<span class="sol-meta-item"><i class="bi bi-telephone"></i> '+s.telefono+'</span>' : '') +
      '</div>' +
    '</div>' +
    '<span class="sol-tipo '+solClaseTipo(tipo)+'">'+(tipo||'Sin tipo')+'</span>' +
    badgeMat +
    '<div class="sol-acciones">' +
      '<button class="sol-btn sol-btn-detalle" onclick="solAbrirModal('+s.id+')"><i class="bi bi-eye"></i> Ver detalle</button>' +
      btnNueva + btnLeida + btnArchivar +
      (estado !== 'eliminada' ? '<button class="sol-btn-x" onclick="solEliminar(event,'+s.id+')" title="Quitar de bandeja"><i class="bi bi-x"></i></button>' : '') +
    '</div>' +
  '</div>';
}

// ── Carga inicial ─────────────────────────────────────────────
document.getElementById('sol-lista').innerHTML = '<div class="sol-loading"><i class="bi bi-arrow-repeat spin"></i> Cargando...</div>';

fetch('/api/admin/solicitudes')
  .then(function(r){ return r.json(); })
  .then(function(data){
    var lista = document.getElementById('sol-lista');
    lista.innerHTML = (data.data||[]).map(solBuildCard).join('');
    solMostrarTab('nueva');
  })
  .catch(function(){
    document.getElementById('sol-lista').innerHTML = '<div class="sol-vacio"><i class="bi bi-exclamation-circle"></i>Error al cargar solicitudes.</div>';
  });
</script>
