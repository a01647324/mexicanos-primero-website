<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- SIDEBAR -->
  <aside>
    <!-- Aquí va tu sidebar -->
  </aside>

  <!-- HEADER -->
  <header>
    <div class="px-3 py-2">
        <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-end">

            <!-- Botón de Notificaciones -->
            <button type="button" class="btn position-relative me-3 btn-secondary">
            <svg class="bi" width="24" height="24" role="img" aria-label="Notificaciones">
                <use xlink:href="#bell"></use>
            </svg>
            <!-- Badge opcional para contador de notificaciones -->
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                3
            </span>
            </button>

            <!-- Botón de Inicio -->
            <button type="button" class="btn me-3 btn-secondary">
            <svg class="bi" width="24" height="24" role="img" aria-label="Inicio">
                <use xlink:href="#house"></use>
            </svg>
            </button>

            <!-- Botón opcional de Claude -->
            <button type="button" class="btn me-3 btn-secondary">
            <svg class="bi" width="24" height="24" role="img" aria-label="Claude">
                <use xlink:href="#stars"></use>
            </svg>
            </button>

            <!-- Perfil del administrador con dropdown -->
            <div class="dropdown">
            <button type="button" class="btn dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown" aria-expanded="false">
                <img src="ruta/a/tu/imagen.jpg" alt="Perfil" width="32" height="32" class="rounded-circle me-2">
                <span>Nombre Admin</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="#">Mi perfil</a></li>
                <li><a class="dropdown-item" href="#">Configuración</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#">Cerrar sesión</a></li>
            </ul>
            </div>

        </div>
        </div>
    </div>
  </header>

  <!-- CONTENIDO (se llenará con fetch más adelante) -->
  <main id="content">
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
