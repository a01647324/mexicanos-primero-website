<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Google Fonts: Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

  <!-- Tu CSS del admin -->
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ========== HEADER (fijo arriba, a la derecha del sidebar) ========== -->
  <header class="admin-header">
    <div class="admin-header-container">
      <div class="admin-header-acciones">

        <!-- Notificaciones -->
        <button type="button" class="admin-icon-btn" aria-label="Notificaciones">
          <i class="bi bi-bell-fill"></i>
          <span class="admin-badge">3</span>
        </button>

        <!-- Inicio -->
        <a href="/" class="admin-icon-btn" aria-label="Ir al inicio">
          <i class="bi bi-house-fill"></i>
        </a>

        <!-- Claude (opcional) -->
        <button type="button" class="admin-icon-btn admin-icon-btn-claude" aria-label="Asistente Claude">
          <i class="bi bi-stars"></i>
        </button>

        <!-- Separador visual -->
        <div class="admin-separador"></div>

        <!-- Perfil con dropdown -->
        <div class="dropdown admin-perfil">
          <button type="button" class="admin-perfil-btn" data-bs-toggle="dropdown" aria-expanded="false">
            <img src="images/admin-avatar.png" alt="Perfil" class="admin-avatar">
            <span class="admin-nombre">Nombre Admin</span>
            <i class="bi bi-chevron-down admin-chevron"></i>
          </button>
          <ul class="dropdown-menu dropdown-menu-end admin-dropdown">
            <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Mi perfil</a></li>
            <li><a class="dropdown-item" href="#"><i class="bi bi-gear me-2"></i>Configuración</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item admin-logout" href="#"><i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión</a></li>
          </ul>
        </div>

      </div>
    </div>
  </header>

  <!-- ========== LAYOUT: SIDEBAR + CONTENIDO ========== -->
  <div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">

      <!-- Encabezado del sidebar -->
      <div class="sidebar-header">
        <i class="bi bi-mortarboard-fill sidebar-icono"></i>
        <span class="sidebar-titulo">Mi Escuela Primero</span>
      </div>

      <!-- Navegación -->
      <nav class="sidebar-nav">

        <a href="#" class="sidebar-link active" data-section="panel">
          <div class="sidebar-link-inner">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Panel General</span>
          </div>
        </a>

        <a href="#" class="sidebar-link" data-section="solicitudes">
          <div class="sidebar-link-inner">
            <i class="bi bi-inbox-fill"></i>
            <span>Bandeja de Solicitudes</span>
            <span class="sidebar-contador">5</span>
          </div>
        </a>

        <a href="#" class="sidebar-link" data-section="gestion-solicitudes">
          <div class="sidebar-link-inner">
            <i class="bi bi-clipboard2-check-fill"></i>
            <span>Gestión de Solicitudes</span>
          </div>
        </a>

        <a href="#" class="sidebar-link" data-section="necesidades">
          <div class="sidebar-link-inner">
            <i class="bi bi-box-seam-fill"></i>
            <span>Gestión de Necesidades</span>
          </div>
        </a>

        <a href="#" class="sidebar-link" data-section="equipo">
          <div class="sidebar-link-inner">
            <i class="bi bi-people-fill"></i>
            <span>Equipo Administrativo</span>
          </div>
        </a>

      </nav>

      <!-- Pie del sidebar -->
      <div class="sidebar-footer">
        <a href="#" class="sidebar-logout">
          <i class="bi bi-box-arrow-left"></i>
          <span>Cerrar sesión</span>
        </a>
      </div>

    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main id="content" class="admin-content">
    </main>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
