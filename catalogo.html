<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Necesidades Escolares — Mexicanos Primero Jalisco</title>
    <link rel="icon" type="image/png" href="img/logo.png"/>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="catalogo.css">
    
</head>
<body data-page="">
    <div id="header-placeholder"></div>

    <!-- ── HERO ── -->
    <div id="header-texto">
        <h1>Catálogo de Necesidades Escolares</h1>
        <p>Con cada gesto, podemos transformar la educación</p>
    </div>

    <!-- ── CONTENIDO PRINCIPAL ── -->
    <main>
        <div id="catalog-wrapper">
            <div id="catalog-loading" style="text-align:center;padding:60px 0;color:var(--gris-medio);font-weight:600;">
                Cargando categorías...
            </div>
            <section id="catalog-grid"></section>
        </div>
    </main>
 
   

    <!-- ── FOOTER ── -->
    <div id="footer-placeholder"></div>
    <script src="components.js"></script>

    <script>
        const API_URL = "http://localhost:3000/api";
 
   function irACategoria(categoriaId) {
    location.href = `categoria.html?id=${categoriaId}`;
}
 
    async function cargarCatalogo() {
        const grid    = document.getElementById('catalog-grid');
        const loading = document.getElementById('catalog-loading');
        const navCats = document.getElementById('header-categorias');
 
        try {
            const res = await fetch(`${API_URL}/catalogo`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const { data } = await res.json();
 
            loading.style.display = 'none';
 
 
            // Tarjetas
            data.forEach((cat, i) => {
                const card = document.createElement('article');
                card.className = 'need-card';
                card.style.animationDelay = `${(i + 1) * 0.05}s`;
                card.onclick = () => irACategoria(cat.id);
card.innerHTML = `
    <div class="need-card-imagen">
        <img src="${cat.imagen || 'images/otros.png'}" alt="${cat.nombre}"
             onerror="this.src='images/otros.png'">
    </div>
    <div class="need-card-cuerpo">
        <h2 class="need-card-titulo">${cat.nombre}</h2>
        <div class="need-card-cta">
            <button class="btn-ver"
                onclick="event.stopPropagation(); irACategoria(${cat.id})">
                Ver necesidades →
            </button>
        </div>
    </div>
`;
                grid.appendChild(card);
            });
 
        } catch (err) {
            loading.innerHTML = `
                <p style="color:#c0392b;font-weight:700;">No se pudieron cargar las categorías.</p>
                <p style="color:#888;font-size:0.85em;">Verifica que el backend esté corriendo en ${API_URL}</p>
                <p style="color:#aaa;font-size:0.8em;">${err.message}</p>
            `;
        }
    }
 
    cargarCatalogo();
    </script>
</body>
</html>
