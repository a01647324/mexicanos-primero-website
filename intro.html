<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inicio | Mi Escuela Primero</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;800;900&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      min-height: 100vh;
      background: #F0F7F1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 900px;
      border-radius: 20px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.07), 0 1px 8px rgba(0,0,0,0.04);
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #1B6B35;
      margin-bottom: 15px;
      font-size: 2.2rem;
      font-weight: 800;
    }

    p {
      color: #4A644A;
      margin-bottom: 35px;
      font-size: 1.05rem;
      font-weight: 400;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 25px;
      margin-top: 20px;
    }

    .card {
      background: #F0F7F1;
      border: 1.5px solid #c8e6cc;
      border-radius: 16px;
      padding: 30px 20px;
      transition: 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 24px rgba(0,153,51,0.10);
      border-color: #009933;
    }

    .card h2 {
      color: #1B6B35;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .card p {
      margin-bottom: 20px;
      color: #4A644A;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #009933;
      color: white;
      padding: 11px 24px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.88rem;
      transition: all 0.22s ease;
      box-shadow: 0 4px 14px rgba(0,153,51,0.22);
    }

    .btn:hover {
      background: #1B6B35;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,153,51,0.28);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bienvenido</h1>
    <p>Selecciona el tipo de usuario para continuar.</p>

    <div class="options">
      <div class="card">
        <h2>Administrador</h2>
        <p>Ingresa al sistema para gestionar necesidades de las escuelas.</p>
        <a class="btn" href="admin-login.html">Entrar como Administrador</a>
      </div>

      <div class="card">
        <h2>Donador</h2>
        <p>Accede a la página destinada para las personas donadoras.</p>
        <a class="btn" href="index.html">Entrar como Donador</a> 
      </div>
    </div>
  </div>
</body>
</html>
