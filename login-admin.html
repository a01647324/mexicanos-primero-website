<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Administrativo</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

<div class="login-wrapper">

  <!-- ── PANEL IZQUIERDO ── -->
  <div class="login-left">
    <div class="login-left-bg"></div>
    <div class="login-blob login-blob-1"></div>
    <div class="login-blob login-blob-2"></div>
    <div class="login-blob login-blob-3"></div>

    <div class="login-logo">
      <img src="images/logo.png" alt="Logo" />
    </div>

    <div class="login-left-content">
      <p class="login-left-eyebrow">Panel Administrativo</p>
      <h1 class="login-left-titulo">
        Gestiona el impacto<br /><span>de cada donación</span>
      </h1>
      <p class="login-left-desc">
        Acceso exclusivo para el equipo de Mi Escuela Primero.
        Administra escuelas, necesidades y solicitudes desde un solo lugar.
      </p>
    </div>
  </div>

  <!-- ── PANEL DERECHO ── -->
  <div class="login-right">
    <div class="login-card">

      <div class="login-card-icon">
        <!-- escudo / admin -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12
                   5.16-1.26 9-6.45 9-12V5l-9-4z"/>
        </svg>
      </div>

      <h2>Acceso administrativo</h2>
      <p class="login-card-sub">
        Ingresa con tu correo institucional y contraseña asignada por el equipo.
      </p>

      <div id="loginMsg" class="login-msg"></div>

      <div class="campo-grupo">
        <label for="correo">Correo institucional</label>
        <input type="email" id="correo" placeholder="admin@miescuela.edu.mx" autocomplete="email" />
      </div>

      <div class="campo-grupo">
        <label for="password">Contraseña</label>
        <div class="campo-password">
          <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password" />
          <button type="button" class="btn-ojo" onclick="togglePassword('password', this)" title="Mostrar contraseña">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.458 12C3.732 7.943 7.523 5 12 5
                   c4.477 0 8.268 2.943 9.542 7
                   -1.274 4.057-5.065 7-9.542 7
                   -4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-login" onclick="loginAdmin()">Ingresar al panel</button>

      <div class="login-footer-links" style="margin-top:1.2rem;">
        <a href="index.html">← Volver al inicio</a>
      </div>

    </div>
  </div>

</div>

<script>
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId)
    const isHidden = input.type === 'password'
    input.type = isHidden ? 'text' : 'password'
    btn.title = isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña'
  }

  function mostrarMsg(texto, tipo) {
    const el = document.getElementById('loginMsg')
    el.textContent = texto
    el.className = 'login-msg ' + tipo
  }

  async function loginAdmin() {
    const correo   = document.getElementById('correo').value.trim()
    const password = document.getElementById('password').value

    if (!correo || !password) {
      mostrarMsg('Por favor completa todos los campos.', 'error')
      return
    }
    
    try {
      const res  = await fetch('/api/auth/login-admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ correo, password })
      })
      const data = await res.json()

      if (!res.ok) {
        mostrarMsg(data.error || 'Credenciales inválidas.', 'error')
        return
      }

      localStorage.setItem('token', data.token)
      localStorage.setItem('rol', data.rol)
      mostrarMsg('Acceso concedido. Redirigiendo...', 'ok')
      setTimeout(() => { window.location.href = 'admin.html' }, 900)

    } catch (err) {
      mostrarMsg('Error de conexión con el servidor.', 'error')
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') loginAdmin()
  })
</script>
</body>
</html>
