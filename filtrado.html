<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Escuela Primero</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">
  <link rel="icon" type="image/png" href="img/logo.png"/>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="catalogo.css">
  <link rel="stylesheet" href="filtrado.css">
  

  <style>
    .btn-ayudar-fixed { display: none; }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <div id="header-placeholder"></div>
  <button class="btn-carrito" onclick="abrirCarrito()">
    ♡ Mis donaciones <span id="carrito-count">0</span>
  </button>

  <!-- HERO -->
  <div id="header-texto" style="background-image: url('images/HEADER.jpeg'); background-size: 120%; background-position: center">
    <h1>Busca y dona</h1>
    <p >Filtra por municipio, categoría y necesidad para donar</p>
  </div>

  <!-- BUSCADOR -->
  <div id="school-finder-wrapper">
    <div id="finder-layout">

      <!-- SIDEBAR -->
      <aside id="sidebar">
        <h2>Filtros</h2>
        <form id="searchForm">
          <div class="filtro-grupo">
            <h3>Categorías</h3>
            <select id="categoriaSelect" name="Categoría">
              <option value="">Todas</option>
            </select>
          </div>
          <div class="filtro-grupo">
            <h3>Subcategorías</h3>
            <select id="subcategoriaSelect" name="Subcategoría">
              <option value="">Todas</option>
            </select>
          </div>
          <div class="filtro-grupo">
            <h3>Municipios</h3>
            <select id="municipioSelect" name="Municipio">
              <option value="">Todos</option>
            </select>
          </div>
          <div class="filtro-grupo">
            <h3>Escuelas</h3>
            <select id="escuelaSelect" name="Escuela">
              <option value="">Todas</option>
            </select>
          </div>
          <button type="submit">Buscar</button>
        </form>
      </aside>

      <!-- RESULTADOS -->
      <div id="results"></div>

    </div>
  </div>

  <!-- MODAL DONAR -->
  <div id="modal-donar">
    <div class="modal-donar-caja">
      <h3 id="modal-donar-titulo" class="modal-donar-h3"></h3>
      <div id="modal-donar-lista"></div>
      <label class="modal-cantidad-label">
        ¿Cuántas unidades deseas donar?
        <input id="modal-donar-cantidad" type="number" min="1" placeholder="Ej. 2">
      </label>
      <div class="modal-donar-acciones">
        <button class="btn-cancelar-modal" onclick="cerrarModalDonar()">Cancelar</button>
        <button class="btn-confirmar" onclick="confirmarModalDonar()">Donar</button>
      </div>
    </div>
  </div>

  <!-- PANEL CARRITO -->
  <div id="carrito-panel">
    <div id="carrito-header">
      <h2>Mis donaciones</h2>
      <button id="carrito-cerrar" onclick="cerrarCarrito()">✕</button>
    </div>
    <div id="carrito-lista">
      <p class="carrito-vacio">Aún no has seleccionado ninguna donación.</p>
    </div>
    <div id="carrito-footer">
      <button class="btn-donar" onclick="irADonar()" style="width:100%;font-size:1rem;padding:14px;">♡ Finalizar donación</button>
    </div>
  </div>



  <!-- ── FOOTER ── -->
  <div id="footer-placeholder"></div>
<script
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>

  const API_URL = "http://localhost:3000/api";
  let dataGlobal= [];
  let todasSubcats = [];   // todas las subcategorias_catalogo (para filtrar por categoría)
  let carrito    = [];
  try {
    const guardado = sessionStorage.getItem('carrito_donacion');
    if (guardado) carrito = JSON.parse(guardado);
} catch(e) { carrito = []; }

document.addEventListener("DOMContentLoaded", () => {
    renderCarrito(); 
});
  /* ══════════════════════════════════════════════════════════
     NIVEL DE NECESIDAD-este no es backend-!!!! esto se hace solo en el frontend
     Calcula nivel basado en la cantidad (campo de la BD).
     Umbral: >50 = Urgente, 10-50 = Moderado, <10 = Bajo
     ══════════════════════════════════════════════════════════ */
  function calcularNivel(cantidad) {
    const n = parseInt(cantidad) || 0;
    if (n > 50) return { label: 'Urgente',  clase: 'nivel-urgente' };
    if (n > 10) return { label: 'Moderado', clase: 'nivel-moderado' };
    return          { label: 'Bajo',      clase: 'nivel-bajo' };
  }

  document.addEventListener("DOMContentLoaded", iniciarApp);
 
  async function iniciarApp() {
    try {
      await cargarFiltros();
      aplicarPreseleccionDesdeLocalStorage();
      await buscarYRenderizar();

      document.getElementById("searchForm").addEventListener("submit", buscarYRenderizar);

      document.getElementById("categoriaSelect")
        .addEventListener("change", () => {
          actualizarDropdownSubcategorias();
          buscarYRenderizar();
        });
 
      document.getElementById("subcategoriaSelect")
        .addEventListener("change", buscarYRenderizar);
      document.getElementById("municipioSelect")
        .addEventListener("change", buscarYRenderizar);
      document.getElementById("escuelaSelect")
        .addEventListener("change", buscarYRenderizar);
 
    } catch (err) {
      console.error("No se pudo iniciar la app:", err);
      mostrarErrorCarga(err.message);
    }
  }
 

  async function cargarFiltros() {
    const res = await fetch(`${API_URL}/filtros`);
    if (!res.ok) throw new Error(`GET /filtros falló: ${res.status}`);
    const filtros = await res.json();
 
    //Municipios 
    const selMun = document.getElementById("municipioSelect");
    filtros.municipios.forEach(n => {
      const o = document.createElement("option");
      o.value = n; o.textContent = n;
      selMun.appendChild(o);
    });
 
    //Escuelas
    const selEsc = document.getElementById("escuelaSelect");
    filtros.escuelas.forEach(n => {
      const o = document.createElement("option");
      o.value = n; o.textContent = n;
      selEsc.appendChild(o);
    });
 
    // Categorías catálogo 
    const selCat = document.getElementById("categoriaSelect");
    filtros.categorias.forEach(cat => {
      const o = document.createElement("option");
      o.value = cat.id;
      o.textContent = cat.nombre;
      o.dataset.categoriaRealId = cat.categoria_real_id;
      selCat.appendChild(o);
    });
 
    //Subcategorías catálogo
    todasSubcats = filtros.subcategorias;
    renderSubcatOpciones(todasSubcats);
  }
 
  /* Renderiza las opciones del select de subcategorías */
  function renderSubcatOpciones(subcats) {
    const sel = document.getElementById("subcategoriaSelect");
    const v = sel.value;
    sel.innerHTML = '<option value="">Todas</option>';
    subcats.forEach(sub => {
      const o = document.createElement("option");
      o.value = sub.id;
      o.textContent = sub.nombre;
      o.dataset.subcategoriaRealId  = sub.subcategoria_real_id;
      o.dataset.categoriaRealId     = sub.categoria_real_id;
      o.dataset.categoriaCatalogoId = sub.categoria_catalogo_id;
      sel.appendChild(o);
    });
    if (v) sel.value = v;
  }
 
  /* Cuando cambia la categoría ahora solo se muestran sussubcats*/
  function actualizarDropdownSubcategorias() {
    const categoriaId = document.getElementById("categoriaSelect").value;
    if (!categoriaId) {
      renderSubcatOpciones(todasSubcats);
    } else {
      const filtradas = todasSubcats.filter(
        s => String(s.categoria_catalogo_id) === String(categoriaId)
      );
      renderSubcatOpciones(filtradas);
    }
  }
 
//cuando viene de categoria se guarda a que le pico para que ya venga con filtros preseleccionados
//y cuando viene de necesidad ahora se guardan sus filtros
  function aplicarPreseleccionDesdeLocalStorage() {
    const filtrosGuardados = sessionStorage.getItem('filtros_guardados');
    if (filtrosGuardados) {
        try {
            const f = JSON.parse(filtrosGuardados);
            sessionStorage.removeItem('filtros_guardados');
            if (f.categoria) {
                document.getElementById("categoriaSelect").value = f.categoria;
                actualizarDropdownSubcategorias();
            }
            if (f.subcategoria) document.getElementById("subcategoriaSelect").value = f.subcategoria;
            if (f.municipio)    document.getElementById("municipioSelect").value    = f.municipio;
            if (f.escuela)      document.getElementById("escuelaSelect").value      = f.escuela;

        } catch(e) { console.warn('Error restaurando filtros:', e); }
        return;
    }

    const catId = localStorage.getItem('filtro_categoria_id');
    const subId = localStorage.getItem('filtro_subcategoria_id');
 
    if (catId) {
      const selCat = document.getElementById("categoriaSelect");
      selCat.value = catId;
      actualizarDropdownSubcategorias();
      localStorage.removeItem('filtro_categoria_id');
    }
 
    if (subId) {
      const selSub = document.getElementById("subcategoriaSelect");
      selSub.value = subId;
      localStorage.removeItem('filtro_subcategoria_id');
    }
  }
 
  async function buscarYRenderizar(event) {
    if (event) event.preventDefault();
 
    const params = new URLSearchParams();
 
    const municipio    = document.getElementById("municipioSelect").value;
    const escuela      = document.getElementById("escuelaSelect").value;
    const categoriaId  = document.getElementById("categoriaSelect").value;
    const subcatId     = document.getElementById("subcategoriaSelect").value;
 
    if (municipio)   params.set("municipio",       municipio);
    if (escuela)     params.set("escuela",          escuela);
    if (categoriaId) params.set("categoria_id",     categoriaId);   
    if (subcatId)    params.set("subcategoria_id",  subcatId);   
 
    const url = `${API_URL}/data${params.toString() ? '?' + params.toString() : ''}`;
 
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`El servidor respondió ${res.status}`);
      const apiData = await res.json();
      dataGlobal = apiData.data;
      renderResults(dataGlobal);
    } catch (err) {
      console.error("Error en búsqueda:", err);
      mostrarErrorCarga(err.message);
    }
  }
 
  function mostrarErrorCarga(mensaje) {
    document.getElementById("results").innerHTML =
      "<div class='sin-resultados'>" +
        "<h3>No se pudieron cargar los datos</h3>" +
        "<p>Verifica que el backend esté corriendo en " + API_URL + "</p>" +
        "<p style='color:#888;font-size:0.9em'>" + mensaje + "</p>" +
      "</div>";
  }
 
  function renderResults(filtered) {
    const results = document.getElementById("results");
    results.innerHTML = "";
 
    if (filtered.length === 0) {
      results.innerHTML = "<p class='sin-resultados'>No se encontraron necesidades pendientes.</p>";
      return;
    }
 
    for (const item of filtered) {
      const nivel = calcularNivel(item.cantidad);
 
      const card = document.createElement("div");
      card.className = "resultado-card";
      card.innerHTML = `
        <div class="card-header">
          <h3>${item.escuela}</h3>
          <span class="nivel-badge ${nivel.clase}">${nivel.label}</span>
        </div>
        <p><strong>Municipio:</strong> ${item.municipio}</p>
        <p><strong>Categoría:</strong> ${item.categoria}</p>
        <p><strong>Subcategoría:</strong> ${item.subcategoria}</p>
        <p><strong>Propuesta:</strong> ${item.propuesta}</p>
        <p><strong>Cantidad requerida:</strong> ${item.cantidad} ${item.unidad || ''}</p>
        <div class="card-acciones">
          <button class="btn-donar" onclick="abrirModalDonar(${item.id})">♡ Donar</button>
          <button class="btn-info"  onclick="verNecesidad(${item.id})">ⓘ Más información</button>
        </div>
      `;
      results.appendChild(card);
    }
  }
 
  function verNecesidad(id) {
    // guardamos la info para que necesidan no haga fetch de nuevo
    const item = dataGlobal.find(d => d.id === id);
    if (!item) return;
    localStorage.setItem('necesidad_actual', JSON.stringify(item));
    //guardar filtros para cuando regrese de necesidad a filtrado
    sessionStorage.setItem('filtros_guardados', JSON.stringify({
        categoria:    document.getElementById("categoriaSelect").value,
        subcategoria: document.getElementById("subcategoriaSelect").value,
        municipio:    document.getElementById("municipioSelect").value,
        escuela:      document.getElementById("escuelaSelect").value
    }));

    location.href = `necesidad.html?id=${id}`;
  }
 
  function agregarAlCarrito(id, cantidad) {
    const item = dataGlobal.find(d => d.id === id);
    if (!item) return;
 
    const existente = carrito.find(c => c.id === id);
    if (existente) {
      // si se habia puesto en el carrito antes,actualizamos cantidad
      existente.cantidad = Math.min(existente.cantidad + cantidad, parseInt(item.cantidad));
    } else {
      carrito.push({
        id:        item.id,
        escuela:   item.escuela,
        propuesta: item.propuesta,
        cantidad:  cantidad,
        max:       parseInt(item.cantidad),
        unidad:    item.unidad || ''
      });
    }
    renderCarrito();
    abrirCarrito();
  }
 
  function cambiarCantidadCarrito(id, delta) {
    const item = carrito.find(c => c.id === id);
    if (!item) return;
    item.cantidad = Math.max(1, Math.min(item.cantidad + delta, item.max));
    renderCarrito();
  }
 
  function quitarDelCarrito(id) {
    carrito = carrito.filter(c => c.id !== id);
    renderCarrito();
  }
 
  function renderCarrito() {
    sessionStorage.setItem('carrito_donacion', JSON.stringify(carrito)); 
    
    const lista = document.getElementById("carrito-lista");
    lista.innerHTML = "";
    document.getElementById("carrito-count").textContent = carrito.length;
 
    if (carrito.length === 0) {
      lista.innerHTML = "<p class='carrito-vacio'>Aún no has seleccionado ninguna donación.</p>";
      return;
    }
 
    carrito.forEach(item => {
      const el = document.createElement("div");
      el.className = "carrito-item";
      el.innerHTML = `
        <div class="carrito-item-info">
          <strong>${item.escuela}</strong>
          <span>${item.propuesta} (${item.unidad})</span>
        </div>
        <div class="carrito-cantidad-wrap">
          <button class="carrito-cantidad-btn" onclick="cambiarCantidadCarrito(${item.id}, -1)">−</button>
          <span class="carrito-cantidad-num">${item.cantidad}</span>
          <button class="carrito-cantidad-btn" onclick="cambiarCantidadCarrito(${item.id}, +1)">+</button>
        </div>
        <button class="carrito-quitar" onclick="quitarDelCarrito(${item.id})">✕</button>
      `;
      lista.appendChild(el);
    });
  }
 
  function abrirCarrito()  { document.getElementById("carrito-panel").classList.add("abierto"); }
  function cerrarCarrito() { document.getElementById("carrito-panel").classList.remove("abierto"); }
 
  
  function irADonar() {
    if (carrito.length === 0) {
      
      mostrarAlerta('Agrega al menos una donación antes de continuar.');
      return;
    }
    sessionStorage.setItem('carrito_donacion', JSON.stringify(carrito));
    location.href = 'pasos.html';
  }

  function mostrarAlerta(mensaje) {
    const prev = document.getElementById('alerta-carrito');
    if (prev) prev.remove();

    const alerta = document.createElement('div');
    alerta.id = 'alerta-carrito';
    alerta.className = 'alert alert-danger alert-dismissible fade show';
    alerta.style.cssText = 'position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:9999; min-width:320px; text-align:center;';
    alerta.innerHTML = `
      ${mensaje}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;
    document.body.appendChild(alerta);
    setTimeout(() => alerta.remove(), 4000);
  }
//DONAR CANTIDAD
  function abrirModalDonar(id) {
    const item = dataGlobal.find(d => d.id === id);
    if (!item) return;
    const modal = document.getElementById('modal-donar');
    document.getElementById('modal-donar-titulo').textContent = item.escuela;
    document.getElementById('modal-donar-lista').innerHTML =
      "<p><strong>Material:</strong> " + item.propuesta + "</p>" +
      "<p><strong>Categoría:</strong> " + item.categoria + "</p>" +
      "<p><strong>Cantidad requerida:</strong> " + item.cantidad + " " + item.unidad + "</p>";
    document.getElementById('modal-donar-cantidad').value = '';
    modal.dataset.id = id;
    document.getElementById('modal-donar-cantidad').max = item.cantidad;
    modal.classList.add('activo');
  }
 
  function cerrarModalDonar() { document.getElementById('modal-donar').classList.remove('activo'); }
 
  function confirmarModalDonar() {
    const modal    = document.getElementById('modal-donar');
    const id       = parseInt(modal.dataset.id);
    const cantidad = parseInt(document.getElementById('modal-donar-cantidad').value);
    const item     = dataGlobal.find(d => d.id === id);
    if (!item) return;
    const max = parseInt(item.cantidad);
    if (!cantidad || cantidad < 1) return alert('Cantidad inválida');
    if (cantidad > max) return alert('Máximo: ' + max);
    agregarAlCarrito(id, cantidad);
    cerrarModalDonar();
  }
 
  document.getElementById('modal-donar').addEventListener('click', function(e) {
    if (e.target === this) cerrarModalDonar();
  });
  </script>
  <script src="components.js"></script>
  <script>
    new MutationObserver(function(_, obs) {
    const navbar = document.querySelector('.navbar');
    const toggle = document.getElementById('menu-toggle');
    const btn = document.querySelector('.btn-carrito');

    if (!navbar || !toggle || !btn) return;

    navbar.insertBefore(btn, toggle);

    obs.disconnect();
  }).observe(document.getElementById('header-placeholder'), {
    childList: true,
    subtree: true
  });
  </script>
</body>
</html>
