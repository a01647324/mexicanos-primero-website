<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categoría – Mi Escuela Primero</title>
    <link rel="icon" type="image/png" href="img/logo.png"/>
    <link rel="stylesheet" href="catalogo.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="catalogo">

    <!-- ── NAVBAR ── -->
    <div id="header-placeholder"></div>


    <!-- ── HERO ── -->
    <div id="header-texto">
        <h1 id="page-title">Cargando...</h1>
        <p>Con cada gesto, podemos transformar la educación</p>
    </div>

    <!-- ── CONTENIDO PRINCIPAL ── -->
    <main>
        <div id="catalog-wrapper">
            <div class="btn-atras-wrap">
                <a href="catalogo.html" class="btn-atras">← Atrás al catálogo</a>
            </div>
            <div id="catalog-loading" style="text-align:center;padding:60px 0;color:var(--gris-medio);font-weight:600;">
                Cargando subcategorías...
            </div>
            <section id="catalog-grid"></section>
        </div>
    </main>

  

    <!-- ── FOOTER ── -->
    <div id="footer-placeholder"></div>
    <script src="components.js"></script>

    <script>
    const API_URL = "http://localhost:3000/api";

    /* ── Leer ID de la categoría (URL o localStorage) ── */
    const urlParams = new URLSearchParams(window.location.search);
    let categoriaId = urlParams.get('id');

    if (!categoriaId) {
        categoriaId = localStorage.getItem('filtro_categoria_id');
        if (categoriaId) {
            localStorage.removeItem('filtro_categoria_id');
        } else {
            location.href = 'catalogo.html';
        }
    }

    /* ── Navbar: llenar categorías ── */
    async function cargarNavbarCategorias() {
        const navCats = document.getElementById('header-categorias');
        if (!navCats) return;
        try {
            const res = await fetch(`${API_URL}/catalogo`);
            if (!res.ok) return;
            const { data } = await res.json();
            data.filter(c => c.link).slice(0, 5).forEach(cat => {
                const a = document.createElement('a');
                a.href = cat.link?.includes('categoria.html')
                ? `categoria.html?id=${cat.id}`
                : cat.link;
                a.textContent = cat.nombre;
                if (String(cat.id) === String(categoriaId)) a.classList.add('active');
                navCats.appendChild(a);
            });
        } catch (e) { console.warn('Navbar cats:', e.message); }
    }

    /* ── Ir a filtrado guardando ambos IDs ── */
    function irAFiltrado(subcategoriaId, catId) {
        localStorage.setItem('filtro_categoria_id',    catId);
        localStorage.setItem('filtro_subcategoria_id', subcategoriaId);
        location.href = 'filtrado.html';
    }

    /* ── Cargar subcategorías de esta categoría ── */
    async function cargarSubcategorias() {
    const grid      = document.getElementById('catalog-grid');
    const loading   = document.getElementById('catalog-loading');
    const pageTitle = document.getElementById('page-title');

    try {
        if (categoriaId == 13) {
            window.location.href = "otros.html";
        }

        const [subRes, catRes] = await Promise.all([
            fetch(`${API_URL}/catalogo/${categoriaId}/subcategorias`),
            fetch(`${API_URL}/catalogo`)
        ]);

        if (!subRes.ok) throw new Error(`HTTP ${subRes.status} — subcategorías`);
        if (!catRes.ok) throw new Error(`HTTP ${catRes.status} — catálogo`);

        const { data: subcats }  = await subRes.json();
        const { data: catalogo } = await catRes.json();

        const catInfo = catalogo.find(c => String(c.id) === String(categoriaId));
        if (catInfo) {
            pageTitle.textContent = catInfo.nombre;
            document.title = `${catInfo.nombre} – Mi Escuela Primero`;
        }

        loading.style.display = 'none';

        if (subcats.length === 0) {
            grid.innerHTML = '<p style="text-align:center;color:var(--gris-medio);padding:40px 0;">No hay subcategorías en esta categoría.</p>';
            return;
        }

        const btnAyudar = document.querySelector('.btn-ayudar-fixed');

        if (btnAyudar) {
            btnAyudar.onclick = (e) => {
                e.preventDefault();
                localStorage.setItem('filtro_categoria_id', categoriaId);
                localStorage.removeItem('filtro_subcategoria_id');
                location.href = 'filtrado.html';
                btnAyudar.href = 'filtrado.html';
            };
        }

        subcats.forEach((sub, i) => {
            const card = document.createElement('article');
            card.className = 'need-card';
            card.style.animationDelay = `${(i + 1) * 0.05}s`;
            card.onclick = () => irAFiltrado(sub.id, categoriaId);
            card.innerHTML = `
                <div class="need-card-imagen">
                    <img src="${sub.imagen || 'images/otros.png'}"
                         alt="${sub.nombre}"
                         onerror="this.src='images/otros.png'">
                </div>
                <div class="need-card-cuerpo">
                    <h2 class="need-card-titulo">${sub.nombre}</h2>
                    <div class="need-card-cta">
                        <button class="btn-ver"
                            onclick="event.stopPropagation(); irAFiltrado(${sub.id}, ${categoriaId})">
                            Donar →
                        </button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

    } catch (err) {
        loading.innerHTML = `
            <p style="color:#c0392b;font-weight:700;">No se pudieron cargar las subcategorías.</p>
            <p style="color:#888;font-size:0.85em;">Verifica que el backend esté corriendo en ${API_URL}</p>
            <p style="color:#aaa;font-size:0.8em;">${err.message}</p>
        `;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    cargarNavbarCategorias();
    cargarSubcategorias();
});

    /* ── Scroll shrink ── */
    window.addEventListener('scroll', () => {
        document.querySelector('.navbar')?.classList.toggle('scrolled', window.scrollY > 30);
    });

    cargarNavbarCategorias();
    cargarSubcategorias();
    </script>
</body>
</html>
