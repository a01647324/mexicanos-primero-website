name: Azure Staging Deploy

on:
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: mexicanos-primero-staging-Itzia
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
          package: ./backend
      
      - name: Prepare deploy package
        working-directory: .
        run: |
          mkdir deploy
          cp -r backend/* deploy/
          cp -r css deploy/ || true
          cp -r images deploy/ || true
          cp -r img deploy/ || true
          cp -r *.html deploy/ || true
          cp -r *.js deploy/ || true
          cp -r *.css deploy/ || true