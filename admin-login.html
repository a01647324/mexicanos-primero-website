<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="img/logo.png"/>
  <title>Login Administrador</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      min-height: 100vh;
      background: #F0F7F1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.07), 0 1px 8px rgba(0,0,0,0.04);
    }

    h1 {
      text-align: center;
      color: #1B6B35;
      margin-bottom: 25px;
      font-weight: 800;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #1A2E1A;
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ccd9cc;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Montserrat', sans-serif;
      color: #1A2E1A;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #009933;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #009933;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.22s ease;
      box-shadow: 0 4px 14px rgba(0,153,51,0.22);
    }

    button:hover {
      background: #1B6B35;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,153,51,0.28);
    }

    .back {
      display: block;
      text-align: center;
      margin-top: 18px;
      text-decoration: none;
      color: #009933;
      font-weight: 700;
      font-size: 0.88rem;
      transition: color 0.2s;
    }

    .back:hover { color: #1B6B35; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Login Administrador</h1>

    <form id="loginForm">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" required />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required />
      </div>

      <button type="submit">Ingresar</button>
    </form>

    <a class="back" href="index.html">Volver al inicio</a>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", function(event) {
      event.preventDefault();

      alert("Bienvenido, has ingresado como administrador del sistema.");
      window.location.href = "admin-panel.html";
    });
  </script>
</body>
</html>
